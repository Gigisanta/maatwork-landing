<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Eye of Horus">
  <defs><linearGradient id="m-eye" x1="24" y1="10" x2="24" y2="44" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#F6D785"/><stop offset="1" stop-color="#C58F23"/></linearGradient></defs>
  <g fill="none" stroke="url(#m-eye)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- brow -->
    <path d="M9.5 16 Q 22 10, 34.5 15.5"/>
    <!-- upper + lower lid (almond) -->
    <path d="M8.5 22.5 Q 20.5 13.5, 34 20.5"/>
    <path d="M8.5 22.5 Q 19.5 30.5, 31.5 26"/>
    <!-- teardrop marking (front) -->
    <path d="M16.5 29.5 Q 14 36, 12.5 42"/>
    <!-- spiral tail (back) -->
    <path d="M33 24 Q 43.5 24, 43.5 33 Q 43.5 40.5, 35.5 39.5"/>
  </g>
  <circle cx="19.5" cy="22.2" r="3" fill="none" stroke="url(#m-eye)" stroke-width="1.5"/>
  <circle cx="19.5" cy="22.2" r="1.35" fill="#9D7BFF"/>
</svg>
